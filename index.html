<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McJoin - Csapat</title>
    <link rel="stylesheet" href="style.css">
    <!-- Javított betűtípus link -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">Mc<span>Join</span></div>
            <nav>
                <ul>
                    <li><a href="#">Főoldal</a></li>
                    <li><a href="#">Szabályzat</a></li>
                    <li><a href="#">Szerver információk</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="team-section">
            <h1>Ismerd meg a csapatot</h1>
            <p class="subtitle">Akik a szerver mögött állnak</p>

            <div class="team-grid">
                <div class="member-card">
                    <div class="avatar t-border"><img src="web.png" alt="Avatar"></div>
                    <h3 class="name">Csirke</h3>
                    <span class="rank tulaj">Tulajdonos</span>
                </div>

                <!-- Manager -->
                <div class="member-card">
                    <div class="avatar m-border"><img src="https://placeholder.com" alt="Avatar"></div>
                    <h3 class="name">kyakzee</h3>
                    <span class="rank manager">Manager</span>
                </div>

                <!-- Fejlesztő -->
                <div class="member-card">
                    <div class="avatar f-border"><img src="https://placeholder.com" alt="Avatar"></div>
                    <h3 class="name">Krypto</h3>
                    <span class="rank fejleszto">Fejlesztő</span>
                </div>

                <!-- Admin -->
                <div class="member-card">
                    <div class="avatar a-border"><img src="https://placeholder.com" alt="Avatar"></div>
                    <h3 class="name">Admin Név</h3>
                    <span class="rank admin">Admin</span>
                </div>

                <!-- Moderátor -->
                <div class="member-card">
                    <div class="avatar mod-border"><img src="https://placeholder.com" alt="Avatar"></div>
                    <h3 class="name">Mod Név</h3>
                    <span class="rank moderator">Moderátor</span>
                </div>

                <!-- Helper -->
                <div class="member-card">
                    <div class="avatar h-border"><img src="https://placeholder.com" alt="Avatar"></div>
                    <h3 class="name">Helper Név</h3>
                    <span class="rank helper">Helper</span>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
